<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>صفحة الترحيب</title>
    <style>
        body { background: #2c3e50; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: sans-serif; }
        .box { border: 2px solid #18bc9c; padding: 30px; border-radius: 15px; text-align: center; }
        h1 { color: #18bc9c; }
    </style>
</head>
<body>
    <div class="box">
        <h1>مرحباً بك في موقعي الأول</h1>
        <p>هذه الصفحة مستقلة تماماً وتعمل كواجهة رئيسية.</p>
    </div>
</body>
</html>
