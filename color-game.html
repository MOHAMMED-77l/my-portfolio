<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لعبة الألوان</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #ecf0f1;
            transition: background-color 0.5s;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
        }
        button {
            padding: 15px 30px;
            font-size: 18px;
            cursor: pointer;
            background-color: #34495e;
            color: white;
            border: none;
            border-radius: 10px;
            margin-top: 20px;
            transition: 0.3s;
        }
        button:hover {
            background-color: #2c3e50;
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>لعبة الألوان التفاعلية</h1>
        <p>اضغط على الزر لتغيير لون الخلفية</p>
        <button onclick="changeColor()">غيّر اللون!</button>
    </div>

    <script>
        function changeColor() {
            // كود جافا سكريبت لتوليد لون عشوائي
            const randomColor = '#' + Math.floor(Math.random()*16777215).toString(16);
            document.body.style.backgroundColor = randomColor;
        }
    </script>

</body>
</html>
